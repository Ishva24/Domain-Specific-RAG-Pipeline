version: "3.9"

services:
  # ── FastAPI RAG Application ─────────────────────────────────────────────────
  api:
    build:
      context: .
      dockerfile: Dockerfile
      target: runtime
    image: docuquery-rag:latest
    container_name: docuquery-api
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=development
      - MLFLOW_TRACKING_URI=http://mlflow:5000
      - FAISS_INDEX_PATH=/app/data/faiss_index
      - VECTOR_STORE_BACKEND=faiss
    env_file:
      - .env
    volumes:
      - rag_data:/app/data
    depends_on:
      mlflow:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import httpx; httpx.get('http://localhost:8000/api/v1/health').raise_for_status()"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - rag_network

  # ── MLflow Tracking Server ──────────────────────────────────────────────────
  mlflow:
    image: ghcr.io/mlflow/mlflow:v2.16.0
    container_name: docuquery-mlflow
    ports:
      - "5000:5000"
    command: >
      mlflow server
      --backend-store-uri sqlite:///mlflow.db
      --default-artifact-root /mlflow/artifacts
      --host 0.0.0.0
      --port 5000
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000/health"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped
    networks:
      - rag_network

  # ── Nginx Reverse Proxy (Production only) ───────────────────────────────────
  nginx:
    image: nginx:1.27-alpine
    container_name: docuquery-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - api
    restart: unless-stopped
    networks:
      - rag_network
    profiles:
      - production  # Only start with: docker compose --profile production up

volumes:
  rag_data:
    driver: local
  mlflow_data:
    driver: local

networks:
  rag_network:
    driver: bridge
